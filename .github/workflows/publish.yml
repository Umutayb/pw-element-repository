name: Publish Package

on:
  push:
    tags:
      - '*'

permissions:
  id-token: write 
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          
      - run: npm ci
      
      - run: npm run build --if-present

      - name: Publish to NPM
        # 1. --access public: Required for first-time scoped or new packages
        # 2. --provenance: Links this version to this specific GitHub run
        run: npm publish --access public --provenance
        env:
          # THIS IS THE CRITICAL LINE:
          # It maps your GitHub Secret to the internal variable npm uses
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}