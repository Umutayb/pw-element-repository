name: Release

on:
  push:
    tags:
      - '*'
      
permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Critical for semantic-release to read commit history

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        # Using 'npm ci' is faster and more reliable in CI than 'npm install'
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Provided by GitHub automatically
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}        # The secret we just created